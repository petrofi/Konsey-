<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="claude-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#claude-bg)"/>
  <!-- Claude sunburst/starburst mark -->
  <g transform="translate(50,50)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="6" fill="white"/>
    <!-- Rays radiating outward -->
    <line x1="0" y1="-10" x2="0" y2="-28" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="8.7" y1="-5" x2="24.2" y2="-14" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="8.7" y1="5" x2="24.2" y2="14" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="0" y2="28" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-8.7" y1="5" x2="-24.2" y2="14" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-8.7" y1="-5" x2="-24.2" y2="-14" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>