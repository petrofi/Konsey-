<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grok-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0D1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#grok-bg)"/>
  <!-- Grok / xAI stylized mark -->
  <g stroke="white" stroke-width="6" stroke-linecap="round" fill="none">
    <!-- X shape -->
    <line x1="28" y1="28" x2="72" y2="72"/>
    <line x1="72" y1="28" x2="28" y2="72"/>
  </g>
  <!-- Accent dot -->
  <circle cx="50" cy="50" r="4" fill="white" opacity="0.9"/>
</svg>